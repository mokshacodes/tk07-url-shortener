name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint check
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright --project pyproject.toml

      - name: Unit tests
        run: uv run pytest

      - name: All tests with coverage
        run: uv run pytest --integration --cov=src --cov-report=term-missing